services:
  ollama_proto:
    image: ollama/ollama:latest
    container_name: ollama_proto
    ports:
      - "11435:11434"
    volumes:
      - ollama_proto_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: itcom-ai-backend
    environment:
      - APP_NAME=${APP_NAME}
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_QUEUE=128
      - NUM_PREDICT=${NUM_PREDICT:-80}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-120}
    volumes:
      - ./logs:/app/logs
    depends_on:
      ollama_proto:
        condition: service_healthy
    ports:
      - "${API_PORT}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: itcom-ai-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_proto_data:
