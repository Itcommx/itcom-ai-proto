<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ITCOM AI Prototype</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#0b1020; color:#e7eaf3; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 20px; }
    .card { background:#121a33; border:1px solid #24305e; border-radius:12px; padding:16px; }
    textarea { width:100%; height:90px; border-radius:10px; border:1px solid #24305e; padding:10px; background:#0b1020; color:#e7eaf3; }
    button { padding:10px 14px; border-radius:10px; border:0; background:#4c7dff; color:white; cursor:pointer; }
    .row { display:flex; gap:10px; align-items:center; margin-top:10px; }
    .out { white-space: pre-wrap; background:#0b1020; border:1px solid #24305e; border-radius:10px; padding:10px; margin-top:10px; min-height:120px; }
    small { color:#9aa6d1; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>ITCOM AI Prototype</h2>
    <div class="card">
      <small>Backend: <span id="api"></span></small>
      <textarea id="msg" placeholder="Ej: Resume en 5 bullets el propósito de este prototipo para junta directiva."></textarea>
      <div class="row">
        <button onclick="send()">Enviar</button>
        <small id="meta"></small>
      </div>
      <div class="out" id="out"></div>
    </div>
  </div>

<script>
const API_BASE = "http://19.153.10.52:8000"; // demo rápida (sin reverse proxy)
document.getElementById("api").innerText = API_BASE;

async function send(){
  const msg = document.getElementById("msg").value.trim();
  if(!msg) return;
  document.getElementById("meta").innerText = "Consultando...";
  document.getElementById("out").innerText = "";

  const r = await fetch(API_BASE + "/chat", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ message: msg, user: "board-demo" })
  });

  const txt = await r.text();
  if(!r.ok){
    document.getElementById("meta").innerText = "Error: " + r.status;
    document.getElementById("out").innerText = txt;
    return;
  }

  const data = JSON.parse(txt);
  document.getElementById("out").innerText = data.answer || "";
  document.getElementById("meta").innerText = `Modelo: ${data.model} • ${data.took_ms}ms`;
}
</script>
</body>
</html>
